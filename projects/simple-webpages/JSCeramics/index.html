<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300..700;1,300..700&display=swap"
      rel="stylesheet"
    />
    <!-- CSS reset file -->
    <link rel="stylesheet" href="./css/reset.css" />
    <!-- Main CSS file -->
    <link rel="stylesheet" href="./css/style.css" />
    <title>Joseph Shmoe | Ceramics</title>
  </head>
  <body>
    <!-- Main website header -->
    <header class="main-header">
      <!-- Logo -->
      <h1 class="main-header__logo">Joseph Shmoe | Ceramics</h1>

      <!-- Navigation -->
      <nav class="main-header__nav">
        <ul class="main-header__nav-list">
          <li class="main-header__nav-item">
            <a
              href="#"
              class="main-header__nav-link main-header__nav-link--current"
              >Work</a
            >
          </li>
          <li class="main-header__nav-item">
            <a href="#about" class="main-header__nav-link">About</a>
          </li>
          <li class="main-header__nav-item">
            <a href="#contact" class="main-header__nav-link">Contact</a>
          </li>
        </ul>
      </nav>
    </header>

    <main class="index-page">
      <!-- Gallery section -->
      <section class="gallery">
        <figure class="gallery__product-card">
          <img
            src="./images/img-1.avif"
            alt="Ceramic vases"
            class="gallery__product-image"
            loading="lazy"
          />
          <figcaption class="gallery__product-name">Joshua Vase</figcaption>
        </figure>

        <figure class="gallery__product-card">
          <img
            src="./images/img-2.avif"
            alt="Ceramic plates"
            class="gallery__product-image"
            loading="lazy"
          />
          <figcaption class="gallery__product-name">Larkin Plates</figcaption>
        </figure>

        <figure class="gallery__product-card">
          <img
            src="./images/img-3.avif"
            alt="Ceramic mugs"
            class="gallery__product-image"
            loading="lazy"
          />
          <figcaption class="gallery__product-name">
            Fortessa Cloud No 2
          </figcaption>
        </figure>

        <figure class="gallery__product-card">
          <img
            src="./images/img-4.avif"
            alt="Different kinds of ceramic products"
            class="gallery__product-image"
            loading="lazy"
          />
          <figcaption class="gallery__product-name">
            Astoria Collection
          </figcaption>
        </figure>

        <figure class="gallery__product-card">
          <img
            src="./images/img-5.avif"
            alt="Ceramic vase and mugs"
            class="gallery__product-image"
            loading="lazy"
          />
          <figcaption class="gallery__product-name">
            Lava Beach Stoneware
          </figcaption>
        </figure>

        <figure class="gallery__product-card">
          <img
            src="./images/img-6.avif"
            alt="Ceramic bowls and mugs"
            class="gallery__product-image"
            loading="lazy"
          />
          <figcaption class="gallery__product-name">
            Sand Canyon Bowls
          </figcaption>
        </figure>

        <figure class="gallery__product-card">
          <img
            src="./images/img-7.avif"
            alt="Ceramic vases with flowers"
            class="gallery__product-image"
            loading="lazy"
          />
          <figcaption class="gallery__product-name">
            Lennon Collection
          </figcaption>
        </figure>

        <figure class="gallery__product-card">
          <img
            src="./images/img-8.avif"
            alt="Ceramic plates with different colors and styles"
            class="gallery__product-image"
            loading="lazy"
          />
          <figcaption class="gallery__product-name">
            Mendocino Dinnerware
          </figcaption>
        </figure>
      </section>

      <!-- About section -->
      <section id="about" class="about">
        <div class="container">
          <h2 class="about__heading">What do I do?</h2>

          <p class="about__text">
            Designing, making, and selling goods of timeless design and
            uncompromising integrity—made thoughtfully, honestly, and with
            pride—to be enjoyed with similar intention.
          </p>

          <p class="about__slogan u-underline">Let's work together.</p>
        </div>
      </section>
    </main>

    <!-- Main footer -->
    <footer class="main-footer">
      <div class="container">
        <!-- Contacts -->
        <section id="contact" class="main-footer__contacts">
          <a
            href="mailto:joseph@jsceramics.com"
            class="main-footer__link main-footer__link--email"
            >joseph@jsceramics.com</a
          >
          <a
            href="tel:2127725445"
            class="main-footer__link main-footer__link--phone"
            ><sup>(212)</sup>772-5445</a
          >
        </section>
      </div>
    </footer>
  </body>
</html>
