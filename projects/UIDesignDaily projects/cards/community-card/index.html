<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,200..1000;1,200..1000&display=swap"
      rel="stylesheet"
    />
    <!-- CSS reset file -->
    <link rel="stylesheet" href="./css/reset.css" />
    <!-- Main CSS file -->
    <link rel="stylesheet" href="./css/style.css" />
    <title>Community Card</title>
  </head>
  <body>
    <main>
      <section class="card-wrapper">
        <div class="card">
          <h1 class="card__heading">Blender Renders</h1>

          <div class="card__about">
            <h2 class="card__about-text">About the community</h2>
            <svg
              width="28"
              height="6"
              viewBox="0 0 28 6"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              class="card__about-icon"
            >
              <circle cx="2.8" cy="2.8" r="2.8" fill="#1E1411" />
              <circle cx="14" cy="2.8" r="2.8" fill="#1E1411" />
              <circle cx="25.2" cy="2.8" r="2.8" fill="#1E1411" />
            </svg>
          </div>

          <p class="card__description">
            A place where beginner Blender artists can post their creations and
            get feedback on.
          </p>

          <div class="card__numbers">
            <p class="card__number">
              13.5K<span class="card__number-text">Members</span>
            </p>

            <p class="card__number">
              47<span class="card__number-text">Online</span>
            </p>
          </div>

          <div class="card__buttons">
            <button type="button" class="card__button card__button--light">
              Join
            </button>
            <button type="button" class="card__button card__button--dark">
              Create Post
            </button>
          </div>

          <p class="card__date">Created Feb.7, 2021</p>
        </div>
      </section>
    </main>
  </body>
</html>
