<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
      rel="stylesheet"
    />

    <!-- CSS reset file -->
    <link rel="stylesheet" href="./css/reset.css" />
    <!-- Main CSS file -->
    <link rel="stylesheet" href="./css/style.css" />

    <title>Progress Card</title>
  </head>
  <body>
    <main class="index-page">
      <!-- Progress card section -->
      <section class="progress-section">
        <div class="progress-card">
          <h2 class="progress-card__header">Your progress</h2>

          <div class="progress-card__info">
            <p class="progress-card__percent">93%</p>

            <div class="progress-card__details">
              <p class="progress-card__complete">32 of 42 complete</p>
              <p class="progress-card__message">
                Finish course to get certificate.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
