<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- CSS reset file -->
    <link rel="stylesheet" href="./css/reset.css" />
    <!-- Main CSS file -->
    <link rel="stylesheet" href="./css/style.css" />
    <title>Job Search Panel</title>
  </head>
  <body>
    <main>
      <div class="wrapper">
        <section class="search-panel container-sm">
          <header class="search-panel__header">
            <div class="search-group">
              <label
                for="search"
                class="search-panel__search-label visually-hidden"
                >Search job</label
              >
              <input
                type="search"
                name="search"
                id="search"
                class="search-panel__search-field"
                placeholder="Search for a part-time job"
              />
              <div class="search-panel__search-icon">
                <img src="./assets/search.svg" alt="Search icon" />
              </div>
            </div>

            <div class="button-group">
              <button type="button" class="search-panel__map-button">
                <img src="./assets/map.svg" alt="Map icon" />Use map
              </button>
            </div>
          </header>

          <ul class="search-panel__categories">
            <li class="search-panel__category">
              <div class="search-panel__category-icon">
                <img src="./assets/icon-0.svg" alt="Furniture icon" />
              </div>
              <p class="search-panel__category-title">Furniture</p>
            </li>
            <li class="search-panel__category">
              <div class="search-panel__category-icon">
                <img src="./assets/icon-2.svg" alt="Property icon" />
              </div>
              <p class="search-panel__category-title">Property</p>
            </li>
            <li class="search-panel__category">
              <div class="search-panel__category-icon">
                <img src="./assets/icon-4.svg" alt="Job icon" />
              </div>
              <p class="search-panel__category-title">Job</p>
            </li>
            <li class="search-panel__category">
              <div class="search-panel__category-icon">
                <img src="./assets/icon-6.svg" alt="Travel icon" />
              </div>
              <p class="search-panel__category-title">Travel</p>
            </li>
            <li class="search-panel__category">
              <div class="search-panel__category-icon">
                <img src="./assets/icon-1.svg" alt="Boat icon" />
              </div>
              <p class="search-panel__category-title">Boat</p>
            </li>
            <li class="search-panel__category">
              <div class="search-panel__category-icon">
                <img src="./assets/icon-3.svg" alt="MC icon" />
              </div>
              <p class="search-panel__category-title">MC</p>
            </li>
            <li class="search-panel__category">
              <div class="search-panel__category-icon">
                <img src="./assets/icon-5.svg" alt="Economy icon" />
              </div>
              <p class="search-panel__category-title">Economy</p>
            </li>
            <li class="search-panel__category">
              <div class="search-panel__category-icon">
                <img src="./assets/icon-7.svg" alt="Holiday icon" />
              </div>
              <p class="search-panel__category-title">Holiday</p>
            </li>
          </ul>
        </section>
      </div>
    </main>
  </body>
</html>
