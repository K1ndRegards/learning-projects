<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- CSS reset file -->
    <link rel="stylesheet" href="./css/reset.css" />
    <!-- Main CSS file -->
    <link rel="stylesheet" href="./css/style.css" />
    <title>Gallery</title>
  </head>
  <body>
    <main class="gallery-page">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>

      <div class="gallery-wrapper">
        <section class="gallery">
          <h2 class="gallery__heading">Popular Collections</h2>

          <ul class="gallery__tag-list">
            <li class="gallery__tag-item">
              <a href="#" class="gallery__tag-link">Profile</a>
            </li>
            <li class="gallery__tag-item">
              <a href="#" class="gallery__tag-link">New York</a>
            </li>
            <li class="gallery__tag-item">
              <a href="#" class="gallery__tag-link">Relaxing</a>
            </li>
            <li class="gallery__tag-item">
              <a href="#" class="gallery__tag-link">Person</a>
            </li>
            <li class="gallery__tag-item">
              <a href="#" class="gallery__tag-link">Fashion</a>
            </li>
          </ul>

          <ul class="gallery__cards">
            <li class="gallery__card">
              <div class="gallery__main-image">
                <img src="images/image-0.png" alt="Beautiful woman" />
              </div>

              <div class="gallery__sub-images">
                <div class="gallery__sub-image">
                  <img src="images/image-3.png" alt="Beautiful woman" />
                </div>
                <div class="gallery__sub-image">
                  <img src="images/image-6.png" alt="Beautiful woman" />
                </div>
                <div class="gallery__sub-image">
                  <img src="images/image-9.png" alt="Beautiful woman" />
                </div>
              </div>

              <div class="gallery__category">
                <span class="gallery__category-name">People</span>
                <span class="gallery__category-count">
                  <img
                    src="./assets/image-icon.svg"
                    alt="Image icon"
                    class="gallery__category-icon"
                  />
                  144
                </span>
              </div>
            </li>

            <li class="gallery__card">
              <div class="gallery__main-image">
                <img src="images/image-1.png" alt="Grand canyon" />
              </div>

              <div class="gallery__sub-images">
                <div class="gallery__sub-image">
                  <img src="images/image-4.png" alt="Grand canyon" />
                </div>
                <div class="gallery__sub-image">
                  <img src="images/image-7.png" alt="Grand canyon" />
                </div>
                <div class="gallery__sub-image">
                  <img src="images/image-10.png" alt="Grand canyon" />
                </div>
              </div>

              <div class="gallery__category">
                <span class="gallery__category-name">Nature</span>
                <span class="gallery__category-count">
                  <img
                    src="./assets/image-icon.svg"
                    alt="Image icon"
                    class="gallery__category-icon"
                  />
                  7k
                </span>
              </div>
            </li>

            <li class="gallery__card">
              <div class="gallery__main-image">
                <img src="images/image-2.png" alt="Historic" />
              </div>

              <div class="gallery__sub-images">
                <div class="gallery__sub-image">
                  <img src="images/image-5.png" alt="Historic" />
                </div>
                <div class="gallery__sub-image">
                  <img src="images/image-8.png" alt="Historic" />
                </div>
                <div class="gallery__sub-image">
                  <img src="images/image-11.png" alt="Historic" />
                </div>
              </div>

              <div class="gallery__category">
                <span class="gallery__category-name">History</span>
                <span class="gallery__category-count">
                  <img
                    src="./assets/image-icon.svg"
                    alt="Image icon"
                    class="gallery__category-icon"
                  />
                  431
                </span>
              </div>
            </li>
          </ul>
        </section>
      </div>
    </main>
  </body>
</html>
