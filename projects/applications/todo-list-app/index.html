<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <!-- Fontawesome -->
    <script
      src="https://kit.fontawesome.com/ee80a239bd.js"
      crossorigin="anonymous"
    ></script>
    <!-- CSS reset file -->
    <link rel="stylesheet" href="./styles/reset.css" />
    <!-- Main CSS file -->
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Project</title>
  </head>
  <body>
    <div class="container container-xs">
      <!-- Main APP window -->
      <div class="todo-app">
        <!-- Message for empty list -->
        <p class="todo-app__list-empty hidden">
          All tasks completed. No new tasks.
        </p>

        <!-- Item list -->
        <ul class="todo-app__item-list">
          <!-- Template for more items -->
          <template id="list-item-template">
            <li class="todo-app__list-item">
              <label class="todo-app__item-label">
                <input type="checkbox" class="todo-app__input-checkbox" />
                <span class="todo-app__checkbox"></span>
                <span class="todo-app__item-text"></span>
              </label>
              <span class="todo-app__remove-btn"
                ><i class="fa-solid fa-xmark"></i
              ></span>
              <span class="todo-app__item-date"></span>
            </li>
          </template>
        </ul>

        <!-- Form controls -->
        <form action="#" class="todo-app__input-form">
          <div class="form-group">
            <!-- Item input field -->
            <label
              for="task-input"
              class="todo-app__input-label visually-hidden"
              >Enter task</label
            >
            <input
              type="text"
              name="task-input"
              id="task-input"
              class="todo-app__task-input"
              placeholder="Enter new task"
              required
            />
          </div>

          <!-- Submit button -->
          <input
            type="submit"
            value="Add new task"
            class="todo-app__submit-btn"
          />
        </form>
      </div>
    </div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
