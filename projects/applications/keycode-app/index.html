<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- CSS reset file -->
    <link rel="stylesheet" href="./styles/reset.css" />
    <!-- Main CSS file -->
    <link rel="stylesheet" href="./styles/style.css" />
    <title>KeyCodes Project</title>
  </head>
  <body>
    <main>
      <section class="container">
        <p class="invite-text">Press any key to get the keycode!</p>

        <div class="key-codes">
          <div class="key-codes__card hidden">
            <h2 class="key-codes__title">e.key</h2>
            <p class="key-codes__key key-codes__key--eKey">a</p>
          </div>

          <div class="key-codes__card hidden">
            <h2 class="key-codes__title">e.keyCode</h2>
            <p class="key-codes__key key-codes__key--eKeyCode">65</p>
          </div>

          <div class="key-codes__card hidden">
            <h2 class="key-codes__title">e.code</h2>
            <p class="key-codes__key key-codes__key--eCode">KeyA</p>
          </div>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
