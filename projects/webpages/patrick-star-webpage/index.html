<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- CSS reset file -->
    <link rel="stylesheet" href="./css/reset.css" />
    <!-- Main CSS file -->
    <link rel="stylesheet" href="./css/style.css" />
    <title>Patrick Star Gallery</title>
  </head>
  <body>
    <header class="main-header">
      <div class="main-header__wrapper container">
        <h1 class="main-header__logo-heading">Patrick Star</h1>

        <nav class="main-header__nav">
          <ul class="main-header__nav-list">
            <li class="main-header__list-item">
              <a href="#" class="main-header__link">Work</a>
            </li>
            <li class="main-header__list-item">
              <a href="#" class="main-header__link">Contact</a>
            </li>
            <li class="main-header__list-item">
              <a href="#" class="main-header__link"
                ><img
                  src="./assets/dribble_icon.png"
                  alt="Dribble logo"
                  class="main-header__icon"
              /></a>
            </li>
            <li class="main-header__list-item">
              <a href="#" class="main-header__link"
                ><img
                  src="./assets/insta_icon.png"
                  alt="Instagram logo"
                  class="main-header__icon"
              /></a>
            </li>
            <li class="main-header__list-item">
              <a href="#" class="main-header__link"
                ><img
                  src="./assets/v_icon.png"
                  alt="V logo"
                  class="main-header__icon"
              /></a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main>
      <section class="gallery">
        <div class="gallery__wrapper container">
          <ul class="gallery__list">
            <li class="gallery__list-item gallery__list-item--eth">
              <img
                src="./images/eth.avif"
                alt="Abstract shape with mountains"
              />
            </li>

            <li class="gallery__list-item gallery__list-item--alphabet">
              <img
                src="./images/alphabet.avif"
                alt="Abstract letter shapes with cream background"
              />
            </li>

            <li class="gallery__list-item gallery__list-item--traveler">
              <img
                src="./images/traveler.avif"
                alt="Traveler entering glowing door"
              />
            </li>

            <li class="gallery__list-item gallery__list-item--cube">
              <img src="./images/cube.avif" alt="Abstract cube" />
            </li>

            <li class="gallery__list-item gallery__list-item--astro">
              <img
                src="./images/astro.avif"
                alt="Dark astronaut in abstract place"
              />
            </li>

            <li class="gallery__list-item gallery__list-item--cup">
              <img src="./images/cup.avif" alt="Flying cup" />
            </li>

            <li class="gallery__list-item gallery__list-item--insta">
              <img src="./images/insta.avif" alt="Glowing instagram logo" />
            </li>

            <li class="gallery__list-item gallery__list-item--foam">
              <img src="./images/foam.avif" alt="Abstract foam" />
            </li>

            <li class="gallery__list-item gallery__list-item--dimensional">
              <img
                src="./images/dimensional.avif"
                alt="Astronaut coming from another dimension"
              />
            </li>
          </ul>
        </div>
      </section>
    </main>

    <footer class="main-footer">
      <div class="main-footer__wrapper container">
        <p class="main-footer__author">
          Designed and built by Patrick Star in Bikini Bottom.
        </p>
      </div>
    </footer>
  </body>
</html>
